# BlackMarket by gugli
# All settings are manageable in-game via /bmadmin

market:
  interval-minutes: 60
  duration-minutes: 10
  announcement-radius: 0
  max-items: 9
  currency-symbol: "$"

messages:
  prefix: "&8[&4&lBlackMarket&8] &r"
  appear: "&4&l⚠ &cThe Black Market has appeared! &7Type &f/bm &7to visit."
  disappear: "&4&l⚠ &cThe Black Market has closed its doors."
  no-permission: "&cYou lack the required permission."
  no-location: "&cNo location has been set. Use /bm setlocation."
  out-of-stock: "&cThis item is out of stock."
  not-enough-money: "&cYou don't have enough money."
  purchase-success: "&aPurchase successful! You spent &f{price}&a."
  market-closed: "&cThe Black Market is not open right now."
  location-set: "&aBlack Market location set to your current position."
  sell-success: "&aItem sold for &f{price}&a."
  cannot-sell: "&cYou cannot sell that item here."

sounds:
  appear: ENTITY_ENDER_DRAGON_GROWL
  open-gui: BLOCK_CHEST_OPEN
  purchase: ENTITY_EXPERIENCE_ORB_PICKUP
  close: BLOCK_CHEST_CLOSE
  countdown-tick: BLOCK_NOTE_BLOCK_BASS
